# Uptime monitoring for transparency.foxbook.dev / api.foxbook.dev / foxbook.dev.
#
# Two cron schedules, to keep the production Neon project on the free tier
# (192 compute-hours/month) without sacrificing fast outage detection:
#   - */15 (every 15 min): the static landing (foxbook.dev) only. It touches
#     no DB, so probing it often is free.
#   - */30 (every 30 min): the DB-backed endpoints (api/healthz,
#     transparency/root). Each of these wakes the Neon compute, so we probe
#     them half as often to roughly halve the monitor-induced wakeups. The
#     tradeoff is up to ~30 min of detection latency on those two endpoints
#     (vs. ~15 min before). See docs/OPERATIONS.md § "Neon compute-hour
#     exhaustion" for why minimising Neon wakeups matters on the free tier.
# Each matrix entry declares the cron it runs on (`schedule:`); the probe step
# is skipped on the off-schedule via `github.event.schedule`. A manual
# workflow_dispatch (no schedule) probes everything.
#
# Pings each endpoint with a short timeout.
# On failure: opens (or comments on) a GitHub issue tagged `uptime-incident`
#   AND fails the workflow run (red X in the Actions tab), so an outage is
#   visible there too — not only via issue notifications. A green run history
#   no longer hides a multi-day outage.
# On recovery: closes the open incident issue automatically; the run goes green.
#
# GitHub notification settings determine when the maintainer gets paged.
# Default: email on issue open/close AND on workflow-run failure.
#
# Silence during planned maintenance:
#   gh workflow disable uptime.yml
#   gh workflow enable uptime.yml
#
# See docs/OPERATIONS.md § "Uptime monitoring" for the full runbook.
#
# Security: all matrix values are passed into run: blocks via env: rather
# than direct `${{ }}` interpolation. Matrix values are static config in
# this workflow (no user-controllable path), but env-passing is the
# defense-in-depth pattern in case a future maintainer adds user-derived
# matrix entries.

name: uptime

on:
  schedule:
    - cron: "*/15 * * * *"  # every 15 min (UTC): static landing only (no DB)
    - cron: "*/30 * * * *"  # every 30 min (UTC): DB-backed endpoints (wake Neon)
  workflow_dispatch:        # manual trigger via Actions tab (probes everything)

permissions:
  issues: write             # to open / comment / close incident issues
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `schedule` keys each endpoint to the cron it should run on. The DB-
        # backed endpoints (transparency/root, api/healthz) wake the Neon
        # compute, so they ride the slower */30 cron to halve monitor-induced
        # wakeups; the static landing rides */15. The probe step is skipped on
        # the off-schedule (see its `if:`). workflow_dispatch has no schedule,
        # so the skip condition lets everything run on a manual trigger.
        include:
          - name: transparency
            url: https://transparency.foxbook.dev/root
            expected_status: 200
            schedule: "*/30 * * * *"
          - name: api
            url: https://api.foxbook.dev/healthz
            expected_status: 200
            schedule: "*/30 * * * *"
          - name: landing
            url: https://foxbook.dev/
            expected_status: 200
            schedule: "*/15 * * * *"
    steps:
      # Skip this endpoint when a scheduled run's cron doesn't match the
      # endpoint's assigned schedule. On workflow_dispatch, github.event.schedule
      # is empty, so the condition is true and every endpoint is probed.
      - name: Probe endpoint
        id: probe
        if: github.event.schedule == '' || github.event.schedule == matrix.schedule
        env:
          ENDPOINT_URL: ${{ matrix.url }}
          EXPECTED_STATUS: ${{ matrix.expected_status }}
          ENDPOINT_NAME: ${{ matrix.name }}
        run: |
          set +e
          status=$(curl -sS -o /tmp/body -w "%{http_code}" --max-time 10 "$ENDPOINT_URL")
          curl_exit=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "curl_exit=$curl_exit" >> "$GITHUB_OUTPUT"
          if [ "$curl_exit" -ne 0 ]; then
            echo "outcome=fail" >> "$GITHUB_OUTPUT"
            echo "reason=curl exit $curl_exit (timeout / connect / TLS)" >> "$GITHUB_OUTPUT"
          elif [ "$status" != "$EXPECTED_STATUS" ]; then
            echo "outcome=fail" >> "$GITHUB_OUTPUT"
            echo "reason=HTTP $status (expected $EXPECTED_STATUS)" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=ok" >> "$GITHUB_OUTPUT"
            echo "reason=" >> "$GITHUB_OUTPUT"
          fi
          echo "Probe result: $ENDPOINT_NAME -> $status (curl exit $curl_exit)"

      - name: Open or update incident issue
        if: steps.probe.outputs.outcome == 'fail'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ENDPOINT_NAME: ${{ matrix.name }}
          ENDPOINT_URL: ${{ matrix.url }}
          FAIL_REASON: ${{ steps.probe.outputs.reason }}
        with:
          script: |
            const endpoint = process.env.ENDPOINT_NAME;
            const url = process.env.ENDPOINT_URL;
            const reason = process.env.FAIL_REASON;
            const title = `uptime-incident: ${endpoint} (${url})`;
            const now = new Date().toISOString();
            const body = `Endpoint: ${url}\nFailure: ${reason}\nDetected at: ${now}\n\nSee \`docs/OPERATIONS.md\` § "Future-you sanity check" for triage.`;

            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-incident',
              per_page: 50,
            });
            const existing = open.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing at ${now}. Reason: ${reason}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['uptime-incident'],
              });
            }

      - name: Close recovered incident issue
        if: steps.probe.outputs.outcome == 'ok'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ENDPOINT_NAME: ${{ matrix.name }}
          ENDPOINT_URL: ${{ matrix.url }}
        with:
          script: |
            const endpoint = process.env.ENDPOINT_NAME;
            const url = process.env.ENDPOINT_URL;
            const title = `uptime-incident: ${endpoint} (${url})`;
            const now = new Date().toISOString();

            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-incident',
              per_page: 50,
            });
            const existing = open.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Recovered at ${now}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
            }

      # Runs last, after the incident issue has been filed, so the issue
      # automation above always completes. Failing here turns this matrix
      # job (and thus the run) red — making an outage visible in the Actions
      # tab, not just via issue email. Values passed via env, not direct
      # interpolation, per the security note at the top of this file.
      - name: Fail run if endpoint is down
        if: steps.probe.outputs.outcome == 'fail'
        env:
          ENDPOINT_NAME: ${{ matrix.name }}
          ENDPOINT_URL: ${{ matrix.url }}
          FAIL_REASON: ${{ steps.probe.outputs.reason }}
        run: |
          echo "::error title=uptime::${ENDPOINT_NAME} (${ENDPOINT_URL}) is DOWN — ${FAIL_REASON}"
          exit 1
