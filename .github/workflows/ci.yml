name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    name: node (pnpm / biome / tsc / core-isolation / no-deskduck / generated)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Core-isolation rule
        run: pnpm check:core-isolation

      - name: Anti-DeskDuck
        run: pnpm check:no-deskduck

      - name: Generated-types drift
        run: pnpm check:generated

  python:
    name: python (uv / ruff / pytest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.x"
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages --frozen

      - name: Ruff
        run: uv run ruff check

      - name: Pytest
        run: uv run pytest

  go:
    name: go (vet / test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Vet
        working-directory: apps/log-daemon-go
        run: go vet ./...

      - name: Test
        working-directory: apps/log-daemon-go
        run: go test ./... -v
