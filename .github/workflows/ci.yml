name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    name: node (pnpm / biome / tsc / core-isolation / no-deskduck / generated)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: SCA audit (non-blocking)
        run: pnpm audit --audit-level=high || true

      - name: Biome check
        # --error-on-warnings: fail CI on any lint warning so the count can't
        # silently creep back up once we've driven it to zero.
        run: pnpm biome check --error-on-warnings

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Core-isolation rule
        run: pnpm check:core-isolation

      - name: Anti-DeskDuck
        run: pnpm check:no-deskduck

      - name: Generated-types drift
        run: pnpm check:generated

  python:
    name: python (uv / ruff / pytest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages --frozen

      - name: Ruff
        run: uv run ruff check

      - name: Pytest
        run: uv run pytest

  go:
    name: go (vet / test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: false

      - name: Vet
        working-directory: apps/log-daemon-go
        run: go vet ./...

      - name: Test
        working-directory: apps/log-daemon-go
        run: go test ./... -v

  integration:
    name: integration (postgres / db migrations / tx-atomicity)
    runs-on: ubuntu-24.04

    # Real Postgres so the DB transaction-atomicity integration tests
    # (apps/api/__tests__/*.tx*.test.ts) actually run instead of being
    # skipped. These suites are gated behind RUN_INTEGRATION_TESTS=1 +
    # DATABASE_URL; without a service container nothing exercises Postgres
    # and the atomic-tx guarantees go unverified (audit High finding).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: foxbook
          POSTGRES_PASSWORD: foxbook
          POSTGRES_DB: foxbook
        ports:
          - 5432:5432
        # Wait until Postgres accepts connections before any step runs.
        options: >-
          --health-cmd "pg_isready -U foxbook -d foxbook"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Point the migration runner and createNodeClient() at the service
      # container. Host-published port (127.0.0.1:5432) is reachable from
      # the job because services map to localhost on the runner.
      DATABASE_URL: postgresql://foxbook:foxbook@127.0.0.1:5432/foxbook
      # Un-skip the integration suites (describe.skipIf(!SHOULD_RUN)).
      RUN_INTEGRATION_TESTS: "1"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run DB migrations
        # Use the project's real migration mechanism (scripts/migrate.mjs:
        # drizzle-orm/postgres-js/migrator over migrations/*.sql). Invoke it
        # directly with DATABASE_URL already in the env — do NOT go through
        # the package's db:migrate script, which loads ../../.env.local that
        # does not (and must not) exist in CI.
        run: node packages/db/scripts/migrate.mjs

      - name: Integration / tx-atomicity tests
        # createNodeClient() reads DATABASE_URL from process.env, and the
        # suites un-skip on RUN_INTEGRATION_TESTS=1 (both set in job env).
        # This runs the full @foxbook/api vitest suite, which now includes
        # the previously-skipped apps/api/__tests__/*.tx*.test.ts files.
        run: pnpm --filter @foxbook/api test
