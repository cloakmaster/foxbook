name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    name: node (pnpm / biome / tsc / core-isolation / no-deskduck / generated)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: SCA audit (non-blocking)
        run: pnpm audit --audit-level=high || true

      - name: Biome check
        # --error-on-warnings: fail CI on any lint warning so the count can't
        # silently creep back up once we've driven it to zero.
        run: pnpm biome check --error-on-warnings

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Core-isolation rule
        run: pnpm check:core-isolation

      - name: Anti-DeskDuck
        run: pnpm check:no-deskduck

      - name: Generated-types drift
        run: pnpm check:generated

  python:
    name: python (uv / ruff / pytest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages --frozen

      - name: Ruff
        run: uv run ruff check

      - name: Pytest
        run: uv run pytest

  go:
    name: go (vet / test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
          cache: false

      - name: Vet
        working-directory: apps/log-daemon-go
        run: go vet ./...

      - name: Test
        working-directory: apps/log-daemon-go
        run: go test ./... -v
