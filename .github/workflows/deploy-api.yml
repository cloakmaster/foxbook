name: Deploy API

# Tag-push gated deploy. No untrusted input (no github.event.* refs,
# no PR titles, no commit messages used in run: commands). Only
# secrets.FLY_API_TOKEN is consumed, via env binding (not interpolation).
#
# Tag from local with:
#   git tag v0.1.0-api && git push origin v0.1.0-api
#
# The flyctl invocation matches scripts/deploy-api.sh; keep them in sync.

on:
  push:
    tags:
      - "v*-api"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1.6
      - name: Deploy
        run: flyctl deploy --remote-only --config apps/api/fly.toml --dockerfile apps/api/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
