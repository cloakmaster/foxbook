[project]
name = "foxbook-sdk"
version = "0.0.0"
description = "Foxbook Python SDK — discover, hire, report helpers for agents."
requires-python = ">=3.12"
dependencies = [
  "cryptography>=45",
  "python-ulid>=3",
  "typing-extensions>=4.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/foxbook_sdk"]
