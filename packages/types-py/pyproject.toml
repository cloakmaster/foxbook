[project]
name = "foxbook-types"
version = "0.0.0"
description = "Generated Python types from JSON Schemas (envelope, agent-card, etc.). Do not hand-edit — run `pnpm generate:types`."
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/foxbook_types"]
