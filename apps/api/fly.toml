# Fly.io config for api.foxbook.dev — apps/api Hono+Node server.
#
# =========================================================================
# DEPLOY SEQUENCE — IMPORTANT
#
# DO NOT use the Fly web-UI "Launch from GitHub" flow. It auto-detects
# from the repo root, finds the Python `pyproject.toml` (uv workspace
# root), and tries to build a Python deployable. That fails. Use the
# local `flyctl` CLI with explicit --config + --dockerfile flags
# pointed at this monorepo subdirectory.
#
# DO NOT `cd apps/api && flyctl launch` either. The Dockerfile's
# `COPY . .` requires the build context to be the REPO ROOT (so pnpm
# can resolve workspace deps). Running flyctl from `apps/api/` makes
# the context `apps/api/` only, and `pnpm install --filter @foxbook/api...`
# fails on missing pnpm-workspace.yaml + sibling packages.
#
# The correct sequence — all from REPO ROOT:
#
#   1. flyctl auth login
#        Authenticates the local flyctl CLI against your Fly account.
#
#   2. flyctl launch --no-deploy --copy-config \
#        --config apps/api/fly.toml \
#        --dockerfile apps/api/Dockerfile
#        Registers the foxbook-api app. --no-deploy skips the deploy
#        until secrets are set (step 3). --copy-config keeps this
#        fly.toml authoritative. --config + --dockerfile point at our
#        monorepo subpaths so Fly doesn't auto-detect from the repo
#        root (which would find pyproject.toml and try to build Python).
#        Skip the prompts to add postgres/redis (we use Neon externally).
#
#   3. flyctl secrets set \
#        DATABASE_URL='<neon-pooled-url>' \
#        DATABASE_URL_DIRECT='<neon-non-pooled-url>' \
#        RESEND_API_KEY='<re_…>' \
#        FOXBOOK_LOG_SIGNING_KEY_HEX='<64-char-hex>' \
#        --app foxbook-api
#        Sets four secrets in Fly's encrypted secret store. NEVER add
#        these as [env] entries below — they'd land in the image, on
#        the dashboard, and in any deploy log. The four names match
#        what apps/api/src/main.ts reads via process.env.*.
#
#   4. DNS: in Cloudflare (or whoever runs foxbook.dev), add CNAME
#        api.foxbook.dev → <foxbook-api>.fly.dev
#        Fly gives the .fly.dev target after step 2.
#
#   5. flyctl certs create api.foxbook.dev --app foxbook-api
#        Provisions the cert. Wait for cert validation (typically
#        1-5 minutes; check with
#        `flyctl certs show api.foxbook.dev --app foxbook-api`).
#
#   6. ./scripts/deploy-api.sh
#        First production deploy. The script invokes flyctl deploy
#        with the correct --config + --dockerfile flags from repo
#        root. Subsequent deploys: same script, OR push a tag
#        matching `v*-api` to trigger .github/workflows/deploy-api.yml.
#
# Recovery from a failed web-UI launch attempt:
#   flyctl apps destroy foxbook-api  # if a half-broken app got registered
#   then restart from step 2 above.
#
# Verify after deploy:
#   curl -sS https://api.foxbook.dev/healthz | jq
#   curl -sS https://api.foxbook.dev/.well-known/foxbook.json | jq
# Expected: HTTP 200 + the documented JSON shapes (see server.ts).
#
# Secrets MUST be in the secret store, NOT [env] below. If you ever
# add DATABASE_URL or FOXBOOK_LOG_SIGNING_KEY_HEX to [env], that's a
# credential leak — same rule the Worker's wrangler.toml enforces.
# =========================================================================

app = "foxbook-api"

# Region: Fra (Frankfurt) is a reasonable default for low-latency
# access from Europe; change to "iad" / "lhr" / wherever Benjamin's
# Fly account latency is best. Fly account-level config can override.
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

# No [env] section by design. All runtime config flows through
# secrets (DATABASE_URL, DATABASE_URL_DIRECT, RESEND_API_KEY,
# FOXBOOK_LOG_SIGNING_KEY_HEX). PORT is set by Fly.

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm so /healthz never cold-starts a check.
  # 256MB shared-cpu-1x is the free-tier sweet spot.
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
