# Fly.io config for api.foxbook.dev — apps/api Hono+Node server.
#
# =========================================================================
# DEPLOY SEQUENCE (one-time setup; run from repo root):
#
#   1. flyctl auth login
#        Authenticates the local flyctl CLI against your Fly account.
#
#   2. cd apps/api && flyctl launch --no-deploy --copy-config
#        Registers the foxbook-api app with Fly. --no-deploy skips the
#        initial deploy until secrets are set (step 3). --copy-config
#        keeps this fly.toml as authoritative rather than regenerating.
#        Skip the prompts to add postgres/redis (we use Neon externally).
#
#   3. flyctl secrets set \
#        DATABASE_URL='<neon-pooled-url>' \
#        DATABASE_URL_DIRECT='<neon-non-pooled-url>' \
#        RESEND_API_KEY='<re_…>' \
#        FOXBOOK_LOG_SIGNING_KEY_HEX='<64-char-hex>'
#        Sets four secrets in Fly's encrypted secret store. NEVER add
#        these as [env] entries below — they'd land in the image, on
#        the dashboard, and in any deploy log. The four names match
#        what apps/api/src/main.ts reads via process.env.*.
#
#   4. DNS: in Cloudflare (or whoever runs foxbook.dev), add CNAME
#        api.foxbook.dev → <foxbook-api>.fly.dev
#        Fly gives the .fly.dev target after the first deploy.
#
#   5. flyctl certs create api.foxbook.dev
#        Provisions the cert. Wait for cert validation (typically
#        1-5 minutes; check with `flyctl certs show api.foxbook.dev`).
#
#   6. ./scripts/deploy-api.sh
#        First production deploy. Subsequent deploys: same script, OR
#        push a tag matching `v*-api` to trigger the GitHub Action at
#        .github/workflows/deploy-api.yml.
#
# Verify after deploy:
#   curl -sS https://api.foxbook.dev/healthz | jq
#   curl -sS https://api.foxbook.dev/.well-known/foxbook.json | jq
# Expected: HTTP 200 + the documented JSON shapes (see server.ts).
#
# Secrets MUST be in the secret store, NOT [env] below. If you ever
# add DATABASE_URL or FOXBOOK_LOG_SIGNING_KEY_HEX to [env], that's a
# credential leak — same rule the Worker's wrangler.toml enforces.
# =========================================================================

app = "foxbook-api"

# Region: Fra (Frankfurt) is a reasonable default for low-latency
# access from Europe; change to "iad" / "lhr" / wherever Benjamin's
# Fly account latency is best. Fly account-level config can override.
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

# No [env] section by design. All runtime config flows through
# secrets (DATABASE_URL, DATABASE_URL_DIRECT, RESEND_API_KEY,
# FOXBOOK_LOG_SIGNING_KEY_HEX). PORT is set by Fly.

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm so /healthz never cold-starts a check.
  # 256MB shared-cpu-1x is the free-tier sweet spot.
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
