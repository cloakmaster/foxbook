# Cloudflare Worker config for transparency.foxbook.dev.
#
# =========================================================================
# DEPLOY SEQUENCE (from apps/transparency/):
#
#   1. pnpm --filter @foxbook/transparency cf:login
#        Binds the local wrangler CLI to your Cloudflare account.
#        (Equivalent: cd apps/transparency && pnpm exec wrangler login)
#
#   2. pnpm --filter @foxbook/transparency cf:secret
#        When prompted, paste the same Neon URL as .env.local. This puts
#        it in Cloudflare's SECRET store — encrypted, NOT visible on the
#        dashboard, NOT included in the Worker bundle. Re-run per-
#        environment (production, staging) if you add them later.
#
#   3. pnpm --filter @foxbook/transparency cf:deploy
#        Ships the Worker. First deploy lands on foxbook-transparency.
#        workers.dev; production route below is commented out until DNS
#        + zone binding settle. Named `cf:deploy` (not `deploy`) because
#        pnpm has a built-in `deploy` command that would shadow the
#        package script when invoked via `pnpm --filter ... deploy`.
#
# wrangler is workspace-local (not on global PATH). The pnpm-script
# shortcuts above resolve node_modules/.bin/wrangler automatically; if
# you invoke wrangler directly, use `pnpm exec wrangler ...` or
# `./node_modules/.bin/wrangler ...` from this directory.
#
# DATABASE_URL MUST be a Cloudflare secret, NOT a [vars] entry.
# If you ever add it under [vars] in this file, it gets baked into the
# Worker bundle and appears in plaintext on the Cloudflare dashboard —
# that's a credential leak. The Worker runtime reads env.DATABASE_URL
# from the secret binding at request time; same variable name in code
# either way, but the binding path is the load-bearing difference.
# =========================================================================

name = "foxbook-transparency"
main = "src/main.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# No [vars] section by design. DATABASE_URL is set via
# `wrangler secret put DATABASE_URL` — see deploy sequence above.

# Custom Domain binding (added via Cloudflare dashboard 2026-04-28).
# Wrangler 4 Custom-Domain syntax: bare hostname pattern, no path,
# no /*, with `custom_domain = true`. Different shape from the older
# zone-route pattern (`zone_name = "..."` + `pattern = ".../*"`) —
# Custom Domains get their own TLS cert, route at the Worker layer
# directly, and don't cost a workers.dev preview request when hit.
#
# Verify from any shell:
#   curl -sS https://transparency.foxbook.dev/root | jq
# Expected: HTTP 200 + STH JSON byte-identical to the workers.dev
# preview URL (foxbook-transparency.inkog-io.workers.dev/root). The
# preview URL stays operational as a fallback.
routes = [
  { pattern = "transparency.foxbook.dev", custom_domain = true }
]
